---
# SPDX-License-Identifier: Apache-2.0
# SPDX-FileCopyrightText: 2025 The Linux Foundation

name: "🔍 Preview Reports"

# yamllint disable-line rule:truthy
on:
  pull_request:
    paths:
      - 'src/**/*.py'
      - 'tests/**/*.py'
      - '.github/workflows/reporting-*.yaml'
      - '.github/scripts/*.sh'
      - 'pyproject.toml'
      - 'uv.lock'

concurrency:
  group: report-previews-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions: {}

jobs:
  verify:
    name: "Verify configuration"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.parse-projects.outputs.matrix }}
      run_timestamp: ${{ steps.metadata.outputs.timestamp }}
      pr_number: ${{ steps.metadata.outputs.pr_number }}
    steps:
      # Harden the runner
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc  # v2.15.1
        with:
          egress-policy: "audit"

      - name: "Checkout pull request"
        # yamllint disable-line rule:line-length
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: "Generate run metadata"
        id: metadata
        shell: bash
        run: |
          timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          pr_number="${{ github.event.pull_request.number }}"

          echo "timestamp=$timestamp" >> "$GITHUB_OUTPUT"
          echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"

          {
            echo "## 🔍 Preview Report Generation"
            echo ""
            echo "**PR:** #$pr_number"
            echo "**Started:** $timestamp"
            echo "**Run ID:** ${{ github.run_id }}"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

      - name: "Verify PROJECTS_JSON secret"
        shell: bash
        env:
          PROJECTS_JSON_B64: ${{ secrets.PROJECTS_JSON }}
        run: |
          # Check if secret is set and non-empty
          if [ -z "$PROJECTS_JSON_B64" ]; then
            echo "::error::PROJECTS_JSON secret is not set or not available"
            exit 1
          fi

          # Verify it's valid base64
          if ! echo "$PROJECTS_JSON_B64" | base64 -d > /dev/null 2>&1; then
            echo "::error::PROJECTS_JSON is not valid base64 encoded"
            exit 1
          fi

          echo "✅ PROJECTS_JSON secret exists (base64 encoded)"

      - name: "Validate required secrets"
        shell: bash
        env:
          CLASSIC_READ_ONLY_PAT_TOKEN: >-
            ${{ secrets.CLASSIC_READ_ONLY_PAT_TOKEN }}
          LF_GERRIT_INFO_MASTER_SSH_KEY:
            ${{ secrets.LF_GERRIT_INFO_MASTER_SSH_KEY }}
        run: |
          validation_failed=false

          echo "🔐 Validating secrets for preview reports..."

          if [ -z "$CLASSIC_READ_ONLY_PAT_TOKEN" ]; then
            echo "::error::CLASSIC_READ_ONLY_PAT_TOKEN secret is not set"
            validation_failed=true
          else
            echo "✅ CLASSIC_READ_ONLY_PAT_TOKEN: Present"
          fi

          if [ -z "$LF_GERRIT_INFO_MASTER_SSH_KEY" ]; then
            echo "::warning::SSH key not set (HTTPS fallback)"
          else
            echo "✅ LF_GERRIT_INFO_MASTER_SSH_KEY: Present"
          fi

          if [ "$validation_failed" = true ]; then
            echo "::error::Secret validation failed"
            exit 1
          fi

          echo "✅ Secrets validated"

      - name: "Parse and validate PROJECTS_JSON"
        id: parse-projects
        shell: bash
        env:
          PROJECTS_JSON_B64: ${{ secrets.PROJECTS_JSON }}
        run: |
          # Decode base64-encoded PROJECTS_JSON secret
          projects_json=$(echo "$PROJECTS_JSON_B64" | base64 -d)

          # Validate JSON
          if ! echo "$projects_json" | jq . > /dev/null 2>&1; then
            echo "::error::Base64 decoded PROJECTS_JSON is invalid"
            exit 1
          fi

          if ! echo "$projects_json" | \
            jq -e 'type == "array"' > /dev/null; then
            echo "::error::PROJECTS_JSON must be an array"
            exit 1
          fi

          # Validate required fields
          # Each project must have 'project' and 'slug',
          # plus either 'gerrit' or 'github'
          if ! echo "$projects_json" | \
            jq -e 'all(.project and .slug and (.gerrit or .github))' \
            > /dev/null; then
            echo "::error::Each project must have 'project' and" \
              "'slug' fields, plus at least one of 'gerrit' or 'github' fields"
            exit 1
          fi

          # Limit to 2 projects for Preview reports to save resources
          projects_json=$(echo "$projects_json" | jq '.[0:2]')
          project_count=$(echo "$projects_json" | jq '. | length')

          echo "✅ Processing $project_count project(s) for preview"

          matrix=$(echo "$projects_json" | jq -c '{include: .}')
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

          {
            echo "### Projects (Preview - Limited)"
            echo ""
            echo "**Processing:** $project_count project(s)"
            echo ""
            echo "$projects_json" | \
              jq -r '.[] |
                "- **\(.project):** `\(.gerrit // .github)` [\(.slug)]"'
            echo ""
            echo "> 💡 **Note:** First 2 projects in Preview reports"
            echo "> Full reports run on production schedule."
          } >> "$GITHUB_STEP_SUMMARY"

  analyze:
    name: "${{ matrix.project }} (Preview)"
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix: ${{ fromJSON(needs.verify.outputs.matrix) }}
    steps:
      # Harden the runner
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc  # v2.15.1
        with:
          egress-policy: "audit"

      - name: "Checkout pull request"
        # yamllint disable-line rule:line-length
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: "Clone Gerrit repos for ${{ matrix.project }}"
        if: matrix.gerrit != '' && matrix.gerrit != null
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/gerrit-clone-action@3cb79a307a7f0c31da04a38e2e10b9696867fe3d  # v1.0.2
        id: clone-gerrit
        with:
          host: ${{ matrix.gerrit }}
          output-path: "./${{ matrix.gerrit }}"
          skip-archived: "true"
          threads: "4"
          clone-timeout: "600"
          retry-attempts: "3"
          retry-base-delay: "3.0"
          retry-max-delay: "60.0"
          use-https: "true"
          move-conflicting: "true"

      - name: "Clone GitHub repos for ${{ matrix.project }}"
        if: |
          (matrix.gerrit == '' || matrix.gerrit == null) &&
          matrix.github != '' && matrix.github != null
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/gerrit-clone-action@3cb79a307a7f0c31da04a38e2e10b9696867fe3d  # v1.0.2
        id: clone-github
        env:
          GITHUB_TOKEN: ${{ secrets.CLASSIC_READ_ONLY_PAT_TOKEN }}
        with:
          host: "github.com/${{ matrix.github }}"
          output-path: "./github.com/${{ matrix.github }}"
          skip-archived: "true"
          threads: "8"
          clone-timeout: "600"
          retry-attempts: "3"
          retry-base-delay: "3.0"
          retry-max-delay: "60.0"
          use-https: "true"

      - name: "Check clone status"
        shell: bash
        run: |
          # Determine which clone step ran and check its outcome
          if [ -n "${{ matrix.gerrit }}" ]; then
            # Gerrit project
            clone_path="./${{ matrix.gerrit }}"
            echo "REPOS_PATH=$clone_path" >> "$GITHUB_ENV"
          elif [ -n "${{ matrix.github }}" ]; then
            # GitHub-only project
            clone_path="./github.com/${{ matrix.github }}"
            echo "REPOS_PATH=$clone_path" >> "$GITHUB_ENV"
          else
            echo "::error::No repository source configured"
            exit 1
          fi

          if [ -d "$clone_path" ]; then
            repo_count=$(find "$clone_path" -maxdepth 1 -type d | wc -l)
            echo "✅ Clone path exists: $clone_path ($repo_count items)"
          else
            echo "::warning::Clone path does not exist: $clone_path"
          fi

      - name: "Clone info-master repository"
        shell: bash
        run: |
          echo "🔗 Cloning info-master repository via HTTPS"

          https_url="https://gerrit.linuxfoundation.org/infra/releng/info-master"

          git clone "$https_url" ./info-master
          echo "✅ Cloned via HTTPS"

      - name: "Install uv"
        # yamllint disable-line rule:line-length
        uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b  # v7.3.0

      - name: "Set up Python"
        # yamllint disable-line rule:line-length
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"

      - name: "Install dependencies"
        shell: bash
        run: uv sync --all-extras

      - name: "Generate preview for ${{ matrix.project }}"
        shell: bash
        env:
          JENKINS_HOST: ${{ matrix.jenkins }}
          # yamllint disable-line rule:line-length
          CLASSIC_READ_ONLY_PAT_TOKEN: ${{ secrets.CLASSIC_READ_ONLY_PAT_TOKEN }}
          GITHUB_ORG: ${{ matrix.github }}
          SSH_AVAILABLE: ${{ env.SSH_AVAILABLE }}
        run: |
          project="${{ matrix.project }}"
          echo "📊 Generating preview reports for $project"

          if [ -n "$JENKINS_HOST" ]; then
            echo "🔧 Jenkins: $JENKINS_HOST"
          fi

          if [ -n "$CLASSIC_READ_ONLY_PAT_TOKEN" ]; then
            echo "🔧 GitHub API integration enabled"
          fi

          uv run project-reporting-tool generate \
            --project "$project" \
            --repos-path "$REPOS_PATH" \
            --output-dir "./reports" \
            --github-token-env CLASSIC_READ_ONLY_PAT_TOKEN \
            --verbose

          echo "✅ Preview reports generated for $project"

      - name: "Create report metadata"
        shell: bash
        env:
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          project="${{ matrix.project }}"
          report_dir="./reports/$project"

          if [ ! -d "$report_dir" ]; then
            echo "::error::Report directory not found: $report_dir"
            exit 1
          fi

          # Create metadata with pull request context
          # Get values, defaulting to empty string if null
          gerrit_server="${{ matrix.gerrit }}"
          jenkins_server="${{ matrix.jenkins }}"
          github_org="${{ matrix.github }}"

          cat > "$report_dir/metadata.json" <<EOF
          {
            "project": "$project",
            "slug": "${{ matrix.slug }}",
            "gerrit_server": "${gerrit_server:-}",
            "jenkins_server": "${jenkins_server:-}",
            "github_org": "${github_org:-}",
            "generated_at": "${{ needs.verify.outputs.run_timestamp }}",
            "workflow_run_id": "${{ github.run_id }}",
            "workflow_run_number": "${{ github.run_number }}",
            "workflow_run_attempt": "${{ github.run_attempt }}",
            "git_sha": "${{ github.event.pull_request.head.sha }}",
            "git_ref": "$PR_HEAD_REF",
            "pr_number": ${{ github.event.pull_request.number }},
            "pr_author": "${{ github.event.pull_request.user.login }}",
            "environment": "previews"
          }
          EOF

          echo "✅ Metadata created"

      - name: "Copy raw data files to temp directory"
        if: always()
        shell: bash
        run: |
          # Create temp directory for raw data files
          mkdir -p ./temp-raw-data-${{ matrix.slug }}

          # Copy JSON files to temp directory (flattening the structure)
          project="${{ matrix.project }}"
          if [ -f "./reports/$project/report_raw.json" ]; then
            cp "./reports/$project/report_raw.json" \
              ./temp-raw-data-${{ matrix.slug }}/
          fi
          if [ -f "./reports/$project/config_resolved.json" ]; then
            cp "./reports/$project/config_resolved.json" \
              ./temp-raw-data-${{ matrix.slug }}/
          fi
          if [ -f "./reports/$project/metadata.json" ]; then
            cp "./reports/$project/metadata.json" \
              ./temp-raw-data-${{ matrix.slug }}/
          fi

          echo "Raw data files prepared for upload"

      - name: "Upload raw data artifacts"
        if: always()
        # yamllint disable-line rule:line-length
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: previews-raw-data-${{ matrix.slug }}
          path: ./temp-raw-data-${{ matrix.slug }}/
          retention-days: 30
          if-no-files-found: error
          compression-level: 9

      - name: "Upload preview artifacts"
        if: always()
        # yamllint disable-line rule:line-length
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: previews-reports-${{ matrix.slug }}
          path: ./reports/${{ matrix.project }}/
          retention-days: 30
          if-no-files-found: error
          compression-level: 6

      - name: "Upload clone manifest"
        if: always()
        # yamllint disable-line rule:line-length
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: previews-clone-manifest-${{ matrix.slug }}
          # yamllint disable-line rule:line-length
          path: "./${{ matrix.gerrit != '' && matrix.gerrit || format('github.com/{0}', matrix.github) }}/clone-manifest.json"
          retention-days: 30
          if-no-files-found: warn

  publish-preview:
    name: "Publish preview reports"
    needs: [verify, analyze]
    if: always() && needs.verify.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    timeout-minutes: 15
    steps:
      # Harden the runner
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc  # v2.15.1
        with:
          egress-policy: "audit"

      - name: "Checkout pull request branch for scripts"
        # yamllint disable-line rule:line-length
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: "Copy script from pull request"
        shell: bash
        run: |
          mkdir -p /tmp/pr-scripts
          cp .github/scripts/generate-index.sh /tmp/pr-scripts/

      - name: "Checkout gh-pages branch"
        # yamllint disable-line rule:line-length
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: gh-pages
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "Download all preview artifacts"
        # yamllint disable-line rule:line-length
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3  # v8.0.0
        with:
          pattern: previews-reports-*
          path: ./downloaded-reports
        continue-on-error: true

      - name: "Prepare preview directory"
        shell: bash
        run: |
          pr_number="${{ needs.verify.outputs.pr_number }}"
          echo "📦 Preparing Preview report for #$pr_number"

          # Create Preview report directory
          preview_dir="previews/$pr_number"
          mkdir -p "$preview_dir"

          # Clean up old preview if it exists
          if [ -d "$preview_dir" ] && [ -n "$preview_dir" ]; then
            rm -rf "${preview_dir:?}"/*
          fi

          # Process each downloaded report
          report_count=0
          for artifact_dir in ./downloaded-reports/previews-reports-*
          do
            if [ ! -d "$artifact_dir" ]; then
              continue
            fi

            # Extract slug from artifact directory name
            # (previews-reports-{slug})
            slug=$(basename "$artifact_dir" | \
              sed 's/^previews-reports-//')

            echo "Processing preview artifact: previews-reports-$slug"

            target_dir="$preview_dir/$slug"
            mkdir -p "$target_dir"

            # Copy report files
            [ -f "$artifact_dir/report.html" ] && \
              cp "$artifact_dir/report.html" "$target_dir/"
            [ -f "$artifact_dir/report_raw.json" ] && \
              cp "$artifact_dir/report_raw.json" "$target_dir/"
            [ -f "$artifact_dir/report.md" ] && \
              cp "$artifact_dir/report.md" "$target_dir/"
            [ -f "$artifact_dir/metadata.json" ] && \
              cp "$artifact_dir/metadata.json" "$target_dir/"

            report_count=$((report_count + 1))
            echo "  ✅ Prepared $project_name"
          done

          echo "REPORT_COUNT=$report_count" >> "$GITHUB_ENV"
          echo "PREVIEW_DIR=$preview_dir" >> "$GITHUB_ENV"
          echo "✅ Prepared $report_count preview report(s)"

      - name: "Generate preview index page"
        shell: bash
        run: |
          # Create .nojekyll to disable Jekyll processing
          touch .nojekyll
          echo "✅ Created .nojekyll file"

          pr_number="${{ needs.verify.outputs.pr_number }}"
          preview_dir="previews/$pr_number"

          # Use the script from the PR branch (has latest fixes)
          bash /tmp/pr-scripts/generate-index.sh \
            "$preview_dir" "previews"

      - name: "Generate parent previews index"
        shell: bash
        run: |
          echo "📄 Generating parent previews index"

          # Create previews directory if it doesn't exist
          mkdir -p previews

          # Find all preview directories
          preview_dirs=()
          if [ -d "previews" ]; then
            for pr_dir in previews/*/; do
              if [ -d "$pr_dir" ] && [ -f "$pr_dir/index.html" ]; then
                pr_num=$(basename "$pr_dir")
                # Only add if it's a number (PR number)
                if [[ "$pr_num" =~ ^[0-9]+$ ]]; then
                  preview_dirs+=("$pr_num")
                fi
              fi
            done
          fi

          # Sort preview directories (descending - newest first)
          sorted_dirs=()
          if [ ${#preview_dirs[@]} -gt 0 ]; then
            mapfile -t sorted_dirs < <(printf '%s\n' \
              "${preview_dirs[@]}" | sort -rn)
          fi

          echo "Found ${#sorted_dirs[@]} preview(s): ${sorted_dirs[*]}"

          # Generate the parent index HTML
          cat > previews/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport"
              content="width=device-width, initial-scale=1.0">
            <title>Preview Reports - Linux Foundation</title>
            <style>
              * { margin: 0; padding: 0; box-sizing: border-box; }
              body {
                font-family: -apple-system, BlinkMacSystemFont,
                  'Segoe UI', Roboto, sans-serif;
                background: linear-gradient(135deg,
                  #667eea 0%, #764ba2 100%);
                min-height: 100vh;
                padding: 2rem 1rem;
              }
              .container { max-width: 1200px; margin: 0 auto; }
              header {
                background: white;
                border-radius: 12px;
                padding: 2rem;
                margin-bottom: 2rem;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
              }
              h1 {
                font-size: 2.5rem;
                margin-bottom: 0.5rem;
                color: #2d3748;
              }
              .subtitle {
                font-size: 1.1rem;
                color: #718096;
                margin-bottom: 1rem;
              }
              .back-link {
                display: inline-block;
                color: #667eea;
                text-decoration: none;
                margin-top: 1rem;
                font-weight: 500;
              }
              .back-link:hover { text-decoration: underline; }
              main {
                background: white;
                border-radius: 12px;
                padding: 2rem;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
              }
              .preview-list {
                display: flex;
                flex-direction: column;
                gap: 1rem;
              }
              .preview-card {
                border: 1px solid #e2e8f0;
                border-radius: 8px;
                padding: 1.5rem;
                transition: all 0.3s ease;
                background: #fafafa;
              }
              .preview-card:hover {
                border-color: #667eea;
                box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
                transform: translateY(-2px);
              }
              .preview-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 0.5rem;
              }
              .preview-title {
                font-size: 1.25rem;
                font-weight: 600;
                color: #2d3748;
              }
              .preview-number {
                background: #667eea;
                color: white;
                padding: 0.25rem 0.75rem;
                border-radius: 12px;
                font-size: 0.9rem;
                font-weight: 600;
              }
              .preview-meta {
                font-size: 0.9rem;
                color: #718096;
                margin-bottom: 1rem;
              }
              .preview-link {
                display: inline-block;
                background: #667eea;
                color: white;
                padding: 0.5rem 1rem;
                border-radius: 6px;
                text-decoration: none;
                font-weight: 500;
                transition: all 0.2s;
              }
              .preview-link:hover {
                background: #5568d3;
                transform: translateY(-1px);
              }
              .empty-state {
                text-align: center;
                padding: 4rem 2rem;
                color: #718096;
              }
              footer {
                text-align: center;
                padding: 2rem;
                color: white;
                margin-top: 2rem;
              }
              footer a { color: white; text-decoration: underline; }
            </style>
          </head>
          <body>
            <div class="container">
              <header>
                <h1>🔍 Preview Reports</h1>
                <p class="subtitle">
                  Pull request preview reports for review
                </p>
                <a href="/project-reporting-tool/" class="back-link">
                  ← Back to Production Reports
                </a>
              </header>

              <main>
                <div class="preview-list">
          EOF

          # Add preview cards or empty state
          if [ ${#sorted_dirs[@]} -eq 0 ]; then
            cat >> previews/index.html <<'EOF'
                  <div class="empty-state">
                    <div style="font-size: 4rem;
                      margin-bottom: 1rem;">📭</div>
                    <h3>No Previews Available</h3>
                    <p>Preview reports will appear here when pull
                      requests are opened.</p>
                  </div>
          EOF
          else
            for pr_num in "${sorted_dirs[@]}"; do
              pr_dir="previews/$pr_num"

              # Count projects in this preview
              project_count=0
              if [ -d "$pr_dir" ]; then
                project_count=$(find "$pr_dir" -maxdepth 1 \
                  -type d ! -path "$pr_dir" | wc -l | tr -d ' ')
              fi

              # Generate card
              cat >> previews/index.html <<CARD
                  <div class="preview-card">
                    <div class="preview-header">
                      <div class="preview-title">Pull Request #${pr_num}</div>
                      <span class="preview-number">PR #${pr_num}</span>
                    </div>
                    <div class="preview-meta">
                      📊 ${project_count} project report(s) available
                    </div>
                    <a href="/project-reporting-tool/previews/${pr_num}/"
                      class="preview-link">
                      View Preview Reports →
                    </a>
                  </div>
          CARD
            done
          fi

          # Close HTML
          cat >> previews/index.html <<'EOF'
                </div>
              </main>

              <footer>
                <p>
                  Generated by
                  <a
                    href="https://github.com/modeseven-lfit/project-reporting-tool"
                    target="_blank">
                    Linux Foundation Reporting Tool
                  </a>
                </p>
                <p style="margin-top: 0.5rem;
                  font-size: 0.9rem;">
                  &copy; 2025 The Linux Foundation | Apache-2.0 License
                </p>
              </footer>
            </div>
          </body>
          </html>
          EOF

          pr_count="${#sorted_dirs[@]}"
          echo "✅ Generated parent previews index with $pr_count preview(s)"

      - name: "Commit and push preview"
        shell: bash
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          pr_number="${{ needs.verify.outputs.pr_number }}"
          preview_dir="previews/$pr_number"

          git config user.name "lf-releng-reports-bot"
          git config user.email \
            "lf-releng+reports-bot@linuxfoundation.org"

          git add "$preview_dir"/
          git add previews/index.html || true  # Add parent index
          git add .nojekyll || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          cat > /tmp/commit-msg.txt <<EOF
          chore: add PR #$pr_number preview reports

          Generated: ${{ needs.verify.outputs.run_timestamp }}
          Reports: ${{ env.REPORT_COUNT }} project(s)
          PR: #$pr_number - $PR_TITLE
          Run: ${{ github.run_id }}
          EOF

          git commit -F /tmp/commit-msg.txt
          git push origin gh-pages

          repo_name="${{ github.event.repository.name }}"
          owner="${{ github.repository_owner }}"
          base_url="https://${owner}.github.io/${repo_name}"
          echo "PREVIEW_URL=${base_url}/${preview_dir}" >> "$GITHUB_ENV"
          echo "✅ Published Preview report"

      - name: "Comment on pull request with links"
        # yamllint disable-line rule:line-length
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd  # v8.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = ${{ github.event.pull_request.number }};
            const previewUrl = process.env.PREVIEW_URL;
            const reportCount = process.env.REPORT_COUNT;

            const serverUrl = '${{ github.server_url }}';
            const repo = '${{ github.repository }}';
            const runId = '${{ github.run_id }}';
            const runUrl = `${serverUrl}/${repo}/actions/runs/${runId}`;
            const body = `## 🔍 Preview Reports Available

            ${previewUrl}
            Workflow run: [${runId}](${runUrl})`;

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('Preview Reports Available')
            );

            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: body
              });
            }

  summary:
    name: "Generate summary"
    needs: [verify, analyze, publish-preview]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 5
    steps:
      # Harden the runner
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc  # v2.15.1
        with:
          egress-policy: "audit"

      - name: "Generate workflow summary"
        shell: bash
        run: |
          # Helper function to convert result to emoji
          result_emoji() {
            case "$1" in
              success) echo "✅" ;;
              failure) echo "❌" ;;
              cancelled) echo "⚠️" ;;
              skipped) echo "⏭️" ;;
              *) echo "❓" ;;
            esac
          }

          {
            echo "## 🔍 Preview Reports Complete"
            echo ""
            echo "**PR:** #${{ github.event.pull_request.number }}"
            echo "**Completed:** $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo ""
            echo "### Job Results"
            echo ""
            echo "- **Verify:** $(result_emoji \
              '${{ needs.verify.result }}')"
            echo "- **Analyze:** $(result_emoji \
              '${{ needs.analyze.result }}')"
            echo "- **Publish:** $(result_emoji \
              '${{ needs.publish-preview.result }}')"
            echo ""
            echo "✅ Preview reports are available from pull request comments"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"
